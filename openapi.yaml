openapi: 3.0.0
info:
  title: Alt Regioni API
  description: API для работы с формами, шаблонами и файлами
  version: 1.0.0

servers:
  - url: /api
    description: API сервер

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        data:
          type: object
          
    FormHistory:
      type: object
      properties:
        id:
          type: string
        formId:
          type: string
        status:
          type: string
          enum: ["DRAFT", "UNDER_REVIEW", "NEEDS_CHANGES", "APPROVED", "REJECTED"]
        memberId:
          type: string
        data:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
        member:
          type: object
          properties:
            id:
              type: string
            role:
              type: string
            user:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
                email:
                  type: string
                image:
                  type: string
                  nullable: true
      required:
        - id
        - formId
        - status
        - memberId
        - createdAt
        
    FormHistoryList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FormHistory'
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer
      required:
        - data
        - meta

    FormTemplateField:
      type: object
      properties:
        id:
          type: string
        templateId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: ["TEXT", "TEXTAREA", "NUMBER", "DATE", "SELECT", "CHECKBOX", "RADIO", "FILE"]
        defaultValue:
          type: string
          nullable: true
        required:
          type: boolean
        order:
          type: integer
        options:
          type: string
          nullable: true
      required:
        - id
        - templateId
        - name
        - type
        - order

    FormTemplateFieldCreate:
      type: object
      properties:
        templateId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: ["TEXT", "TEXTAREA", "NUMBER", "DATE", "SELECT", "CHECKBOX", "RADIO", "FILE"]
        defaultValue:
          type: string
          nullable: true
        required:
          type: boolean
        order:
          type: integer
        options:
          type: string
          nullable: true
      required:
        - templateId
        - name
        - type
        - order

    FormTemplateFieldUpdate:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: ["TEXT", "TEXTAREA", "NUMBER", "DATE", "SELECT", "CHECKBOX", "RADIO", "FILE"]
        defaultValue:
          type: string
          nullable: true
        required:
          type: boolean
        order:
          type: integer
        options:
          type: string
          nullable: true

    FormTemplateFieldList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FormTemplateField'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - items
        - total
        - limit
        - offset

    FormTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastModifiedBy:
          type: string
          nullable: true
        version:
          type: integer
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FormTemplateField'
      required:
        - id
        - name
        - createdAt
        - updatedAt
        - version

    FormTemplateCreate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
      required:
        - name

    FormTemplateUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true

    FormTemplateList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FormTemplate'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - items
        - total
        - limit
        - offset

    Form:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: ["DRAFT", "UNDER_REVIEW", "NEEDS_CHANGES", "APPROVED", "REJECTED"]
        organizationId:
          type: string
        creatorMemberId:
          type: string
        executorMemberId:
          type: string
          nullable: true
        templateId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastModifiedBy:
          type: string
          nullable: true
        version:
          type: integer
        creator:
          type: object
        executor:
          type: object
          nullable: true
        organization:
          type: object
        template:
          type: object
          nullable: true
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FormField'
        history:
          type: array
          items:
            type: object
        reviewFlow:
          type: object
          nullable: true
      required:
        - id
        - title
        - status
        - organizationId
        - creatorMemberId
        - createdAt
        - updatedAt
        - version

    FormCreate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        organizationId:
          type: string
        templateId:
          type: string
          nullable: true
        executorMemberId:
          type: string
          nullable: true
      required:
        - title
        - organizationId

    FormUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: ["DRAFT", "UNDER_REVIEW", "NEEDS_CHANGES", "APPROVED", "REJECTED"]
        executorMemberId:
          type: string
          nullable: true

    FormList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Form'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - items
        - total
        - limit
        - offset

    FormField:
      type: object
      properties:
        id:
          type: string
        formId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: ["TEXT", "TEXTAREA", "NUMBER", "DATE", "SELECT", "CHECKBOX", "RADIO", "FILE"]
        value:
          type: string
          nullable: true
        required:
          type: boolean
        validationRules:
          type: string
          nullable: true
        order:
          type: integer
        options:
          type: string
          nullable: true
        files:
          type: array
          items:
            type: object
      required:
        - id
        - formId
        - name
        - type
        - order

    FormFieldCreate:
      type: object
      properties:
        formId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: ["TEXT", "TEXTAREA", "NUMBER", "DATE", "SELECT", "CHECKBOX", "RADIO", "FILE"]
        value:
          type: string
          nullable: true
        required:
          type: boolean
        validationRules:
          type: string
          nullable: true
        order:
          type: integer
        options:
          type: string
          nullable: true
      required:
        - formId
        - name
        - type
        - order

    FormFieldUpdate:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
          nullable: true
        required:
          type: boolean
        validationRules:
          type: string
          nullable: true
        order:
          type: integer
        options:
          type: string
          nullable: true

    FormFieldList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FormField'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - items
        - total
        - limit
        - offset

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

paths:
  /form-template-fields:
    post:
      summary: Создание поля шаблона формы
      operationId: createFormTemplateField
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormTemplateFieldCreate'
      responses:
        '200':
          description: Поле шаблона формы успешно создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormTemplateField'
        '400':
          description: Неверные данные запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Шаблон формы не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: Получение списка полей шаблона формы
      operationId: listFormTemplateFields
      security:
        - BearerAuth: []
      parameters:
        - name: templateId
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Список полей шаблона формы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormTemplateFieldList'
        '400':
          description: Неверные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Шаблон формы не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /form-template-fields/{id}:
    get:
      summary: Получение информации о поле шаблона формы
      operationId: getFormTemplateField
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Информация о поле шаблона формы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormTemplateField'
        '400':
          description: Неверные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Поле шаблона формы не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Обновление поля шаблона формы
      operationId: updateFormTemplateField
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormTemplateFieldUpdate'
      responses:
        '200':
          description: Поле шаблона формы успешно обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormTemplateField'
        '400':
          description: Неверные данные запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Поле шаблона формы не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Удаление поля шаблона формы
      operationId: deleteFormTemplateField
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Поле шаблона формы успешно удалено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Неверные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Поле шаблона формы не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /form-templates:
    post:
      summary: Создание шаблона формы
      operationId: createFormTemplate
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormTemplateCreate'
      responses:
        '200':
          description: Шаблон формы успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormTemplate'
        '400':
          description: Неверные данные запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: Получение списка шаблонов форм
      operationId: listFormTemplates
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Список шаблонов форм
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormTemplateList'
        '400':
          description: Неверные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /form-templates/{id}:
    get:
      summary: Получение информации о шаблоне формы
      operationId: getFormTemplate
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Информация о шаблоне формы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormTemplate'
        '400':
          description: Неверные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Шаблон формы не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Обновление шаблона формы
      operationId: updateFormTemplate
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormTemplateUpdate'
      responses:
        '200':
          description: Шаблон формы успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormTemplate'
        '400':
          description: Неверные данные запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Шаблон формы не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Удаление шаблона формы
      operationId: deleteFormTemplate
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Шаблон формы успешно удален
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Неверные параметры запроса или шаблон используется в формах
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Шаблон формы не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /forms:
    post:
      summary: Создание формы
      operationId: createForm
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormCreate'
      responses:
        '200':
          description: Форма успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Form'
        '400':
          description: Неверные данные запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Нет доступа к организации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Шаблон или исполнитель не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: Получение списка форм
      operationId: listForms
      security:
        - BearerAuth: []
      parameters:
        - name: organizationId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: ["DRAFT", "UNDER_REVIEW", "NEEDS_CHANGES", "APPROVED", "REJECTED"]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Список форм
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormList'
        '400':
          description: Неверные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Нет доступа к организации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /forms/{id}:
    get:
      summary: Получение информации о форме
      operationId: getForm
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Информация о форме
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Form'
        '400':
          description: Неверные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Форма не найдена или нет доступа
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Обновление формы
      operationId: updateForm
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormUpdate'
      responses:
        '200':
          description: Форма успешно обновлена
          content:
