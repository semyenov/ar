openapi: 3.0.0
info:
  title: Alt Regioni API
  description: API для работы с формами, шаблонами и файлами
  version: 1.0.0

servers:
  - url: /api
    description: API сервер

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        data:
          type: object

    FormTemplateField:
      type: object
      properties:
        id:
          type: string
        templateId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: ["TEXT", "TEXTAREA", "NUMBER", "DATE", "SELECT", "CHECKBOX", "RADIO", "FILE"]
        defaultValue:
          type: string
          nullable: true
        required:
          type: boolean
        order:
          type: integer
        options:
          type: string
          nullable: true
      required:
        - id
        - templateId
        - name
        - type
        - order

    FormTemplateFieldCreate:
      type: object
      properties:
        templateId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: ["TEXT", "TEXTAREA", "NUMBER", "DATE", "SELECT", "CHECKBOX", "RADIO", "FILE"]
        defaultValue:
          type: string
          nullable: true
        required:
          type: boolean
        order:
          type: integer
        options:
          type: string
          nullable: true
      required:
        - templateId
        - name
        - type
        - order

    FormTemplateFieldUpdate:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: ["TEXT", "TEXTAREA", "NUMBER", "DATE", "SELECT", "CHECKBOX", "RADIO", "FILE"]
        defaultValue:
          type: string
          nullable: true
        required:
          type: boolean
        order:
          type: integer
        options:
          type: string
          nullable: true

    FormTemplateFieldList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FormTemplateField'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - items
        - total
        - limit
        - offset

    FormTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastModifiedBy:
          type: string
          nullable: true
        version:
          type: integer
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FormTemplateField'
      required:
        - id
        - name
        - createdAt
        - updatedAt
        - version

    FormTemplateCreate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
      required:
        - name

    FormTemplateUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true

    FormTemplateList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FormTemplate'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - items
        - total
        - limit
        - offset

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

paths:
  /form-template-fields:
    post:
      summary: Создание поля шаблона формы
      operationId: createFormTemplateField
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormTemplateFieldCreate'
      responses:
        '200':
          description: Поле шаблона формы успешно создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormTemplateField'
        '400':
          description: Неверные данные запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Шаблон формы не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: Получение списка полей шаблона формы
      operationId: listFormTemplateFields
      security:
        - BearerAuth: []
      parameters:
        - name: templateId
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Список полей шаблона формы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormTemplateFieldList'
        '400':
          description: Неверные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Шаблон формы не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /form-template-fields/{id}:
    get:
      summary: Получение информации о поле шаблона формы
      operationId: getFormTemplateField
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Информация о поле шаблона формы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormTemplateField'
        '400':
          description: Неверные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Поле шаблона формы не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Обновление поля шаблона формы
      operationId: updateFormTemplateField
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormTemplateFieldUpdate'
      responses:
        '200':
          description: Поле шаблона формы успешно обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormTemplateField'
        '400':
          description: Неверные данные запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Поле шаблона формы не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Удаление поля шаблона формы
      operationId: deleteFormTemplateField
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Поле шаблона формы успешно удалено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Неверные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Поле шаблона формы не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /form-templates:
    post:
      summary: Создание шаблона формы
      operationId: createFormTemplate
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormTemplateCreate'
      responses:
        '200':
          description: Шаблон формы успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormTemplate'
        '400':
          description: Неверные данные запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: Получение списка шаблонов форм
      operationId: listFormTemplates
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Список шаблонов форм
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormTemplateList'
        '400':
          description: Неверные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /form-templates/{id}:
    get:
      summary: Получение информации о шаблоне формы
      operationId: getFormTemplate
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Информация о шаблоне формы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormTemplate'
        '400':
          description: Неверные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Шаблон формы не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Обновление шаблона формы
      operationId: updateFormTemplate
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormTemplateUpdate'
      responses:
        '200':
          description: Шаблон формы успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormTemplate'
        '400':
          description: Неверные данные запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Шаблон формы не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Удаление шаблона формы
      operationId: deleteFormTemplate
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Шаблон формы успешно удален
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Неверные параметры запроса или шаблон используется в формах
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Шаблон формы не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'