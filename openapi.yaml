openapi: 3.0.0
info:
  title: Alt Regioni API
  description: API для работы с формами, шаблонами и файлами
  version: 1.0.0

servers:
  - url: /api
    description: API сервер

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        data:
          type: object
          
    ReviewFlow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        formId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        status:
          type: string
          enum: ["OPEN", "CLOSED"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastModifiedBy:
          type: string
          nullable: true
        version:
          type: integer
        form:
          type: object
          nullable: true
        organization:
          type: object
          nullable: true
        comments:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/Comment'
      required:
        - id
        - formId
        - organizationId
        - status
        - createdAt
        - updatedAt
        - version
    
    ReviewFlowCreate:
      type: object
      properties:
        formId:
          type: string
          format: uuid
        status:
          type: string
          enum: ["OPEN", "CLOSED"]
          default: "OPEN"
      required:
        - formId
    
    ReviewFlowUpdate:
      type: object
      properties:
        status:
          type: string
          enum: ["OPEN", "CLOSED"]
      required:
        - status
    
    ReviewFlowList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ReviewFlow'
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer
      required:
        - data
        - meta

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        reviewFlowId:
          type: string
          format: uuid
        memberId:
          type: string
          format: uuid
        content:
          type: string
        fieldReference:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        member:
          type: object
          properties:
            id:
              type: string
            role:
              type: string
            user:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
                email:
                  type: string
                image:
                  type: string
                  nullable: true
      required:
        - id
        - reviewFlowId
        - memberId
        - content
        - createdAt
    
    CommentCreate:
      type: object
      properties:
        reviewFlowId:
          type: string
          format: uuid
        content:
          type: string
        fieldReference:
          type: string
          nullable: true
      required:
        - reviewFlowId
        - content
    
    CommentUpdate:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    
    CommentList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer
      required:
        - data
        - meta
    
    File:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        originalName:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        accessLevel:
          type: string
          enum: ["PRIVATE", "ORGANIZATION", "PUBLIC"]
          default: "ORGANIZATION"
        description:
          type: string
          nullable: true
        organizationId:
          type: string
          format: uuid
        uploaderMemberId:
          type: string
          format: uuid
        folderId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        accessedAt:
          type: string
          format: date-time
          nullable: true
        deleted:
          type: boolean
          default: false
        lastModifiedBy:
          type: string
          nullable: true
        version:
          type: integer
        uploader:
          type: object
          properties:
            id:
              type: string
            role:
              type: string
            user:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
                email:
                  type: string
                image:
                  type: string
                  nullable: true
        folder:
          type: object
          nullable: true
      required:
        - id
        - filename
        - originalName
        - mimeType
        - size
        - accessLevel
        - organizationId
        - uploaderMemberId
        - createdAt
        - updatedAt
        - version
    
    FileCreate:
      type: object
      properties:
        description:
          type: string
        accessLevel:
          type: string
          enum: ["PRIVATE", "ORGANIZATION", "PUBLIC"]
        folderId:
          type: string
          format: uuid
          nullable: true
      required: []
    
    FileUpdate:
      type: object
      properties:
        filename:
          type: string
        description:
          type: string
        accessLevel:
          type: string
          enum: ["PRIVATE", "ORGANIZATION", "PUBLIC"]
        folderId:
          type: string
          format: uuid
          nullable: true
      required: []
    
    FileList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/File'
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer
      required:
        - data
        - meta
    
    FileFolder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        organizationId:
          type: string
          format: uuid
        creatorMemberId:
          type: string
          format: uuid
        parentId:
          type: string
          format: uuid
          nullable: true
        path:
          type: string
          nullable: true
        level:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastModifiedBy:
          type: string
          nullable: true
        version:
          type: integer
        creator:
          type: object
          properties:
            id:
              type: string
            role:
              type: string
            user:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
                email:
                  type: string
                image:
                  type: string
                  nullable: true
        parent:
          $ref: '#/components/schemas/FileFolder'
          nullable: true
        filesCount:
          type: integer
          nullable: true
        childrenCount:
          type: integer
          nullable: true
      required:
        - id
        - name
        - organizationId
        - creatorMemberId
        - level
        - createdAt
        - updatedAt
        - version
    
    FileFolderCreate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        parentId:
          type: string
          format: uuid
          nullable: true
      required:
        - name
    
    FileFolderUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        parentId:
          type: string
          format: uuid
          nullable: true
      required: []
    
    FileFolderList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FileFolder'
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer
      required:
        - data
        - meta
    
    FileFolderPath:
      type: object
      properties:
        path:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
            required:
              - id
              - name
      required:
        - path
    
    FileShare:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fileId:
          type: string
          format: uuid
        memberId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
        file:
          $ref: '#/components/schemas/File'
        member:
          type: object
          properties:
            id:
              type: string
            role:
              type: string
            user:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
                email:
                  type: string
                image:
                  type: string
                  nullable: true
      required:
        - id
        - fileId
        - memberId
        - createdAt
    
    FileShareCreate:
      type: object
      properties:
        fileId:
          type: string
          format: uuid
        memberId:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time
          nullable: true
      required:
        - fileId
        - memberId
    
    FileShareList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FileShare'
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer
      required:
        - data
        - meta
    
    FormFieldFile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        formFieldId:
          type: string
          format: uuid
        fileId:
          type: string
          format: uuid
        file:
          $ref: '#/components/schemas/File'
      required:
        - id
        - formFieldId
        - fileId
    
    FormFieldFileCreate:
      type: object
      properties:
        formFieldId:
          type: string
          format: uuid
        fileId:
          type: string
          format: uuid
      required:
        - formFieldId
        - fileId
    
    FormFieldFileList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FormFieldFile'
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer
      required:
        - data
        - meta
    
    FormHistory:
      type: object
      properties:
        id:
          type: string
        formId:
          type: string
        status:
          type: string
          enum: ["DRAFT", "UNDER_REVIEW", "NEEDS_CHANGES", "APPROVED", "REJECTED"]
        memberId:
          type: string
        data:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
        member:
          type: object
          properties:
            id:
              type: string
            role:
              type: string
            user:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
                email:
                  type: string
                image:
                  type: string
                  nullable: true
      required:
        - id
        - formId
        - status
        - memberId
        - createdAt
        
    FormHistoryList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FormHistory'
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer
      required:
        - data
        - meta

    FormTemplateField:
      type: object
      properties:
        id:
          type: string
        templateId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: ["TEXT", "TEXTAREA", "NUMBER", "DATE", "SELECT", "CHECKBOX", "RADIO", "FILE"]
        defaultValue:
          type: string
          nullable: true
        required:
          type: boolean
        order:
          type: integer
        options:
          type: string
          nullable: true
      required:
        - id
        - templateId
        - name
        - type
        - order

    FormTemplateFieldCreate:
      type: object
      properties:
        templateId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: ["TEXT", "TEXTAREA", "NUMBER", "DATE", "SELECT", "CHECKBOX", "RADIO", "FILE"]
        defaultValue:
          type: string
          nullable: true
        required:
          type: boolean
        order:
          type: integer
        options:
          type: string
          nullable: true
      required:
        - templateId
        - name
        - type
        - order

    FormTemplateFieldUpdate:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: ["TEXT", "TEXTAREA", "NUMBER", "DATE", "SELECT", "CHECKBOX", "RADIO", "FILE"]
        defaultValue:
          type: string
          nullable: true
        required:
          type: boolean
        order:
          type: integer
        options:
          type: string
          nullable: true

    FormTemplateFieldList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FormTemplateField'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - items
        - total
        - limit
        - offset

    FormTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastModifiedBy:
          type: string
          nullable: true
        version:
          type: integer
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FormTemplateField'
      required:
        - id
        - name
        - createdAt
        - updatedAt
        - version

    FormTemplateCreate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
      required:
        - name

    FormTemplateUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true

    FormTemplateList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FormTemplate'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - items
        - total
        - limit
        - offset

    Form:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: ["DRAFT", "UNDER_REVIEW", "NEEDS_CHANGES", "APPROVED", "REJECTED"]
        organizationId:
          type: string
        creatorMemberId:
          type: string
        executorMemberId:
          type: string
          nullable: true
        templateId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastModifiedBy:
          type: string
          nullable: true
        version:
          type: integer
        creator:
          type: object
        executor:
          type: object
          nullable: true
        organization:
          type: object
        template:
          type: object
          nullable: true
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FormField'
        history:
          type: array
          items:
            type: object
        reviewFlow:
          type: object
          nullable: true
      required:
        - id
        - title
        - status
        - organizationId
        - creatorMemberId
        - createdAt
        - updatedAt
        - version

    FormCreate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        organizationId:
          type: string
        templateId:
          type: string
          nullable: true
        executorMemberId:
          type: string
          nullable: true
      required:
        - title
        - organizationId

    FormUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: ["DRAFT", "UNDER_REVIEW", "NEEDS_CHANGES", "APPROVED", "REJECTED"]
        executorMemberId:
          type: string
          nullable: true

    FormList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Form'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - items
        - total
        - limit
        - offset

    FormField:
      type: object
      properties:
        id:
          type: string
        formId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: ["TEXT", "TEXTAREA", "NUMBER", "DATE", "SELECT", "CHECKBOX", "RADIO", "FILE"]
        value:
          type: string
          nullable: true
        required:
          type: boolean
        validationRules:
          type: string
          nullable: true
        order:
          type: integer
        options:
          type: string
          nullable: true
        files:
          type: array
          items:
            type: object
      required:
        - id
        - formId
        - name
        - type
        - order

    FormFieldCreate:
      type: object
      properties:
        formId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: ["TEXT", "TEXTAREA", "NUMBER", "DATE", "SELECT", "CHECKBOX", "RADIO", "FILE"]
        value:
          type: string
          nullable: true
        required:
          type: boolean
        validationRules:
          type: string
          nullable: true
        order:
          type: integer
        options:
          type: string
          nullable: true
      required:
        - formId
        - name
        - type
        - order

    FormFieldUpdate:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
          nullable: true
        required:
          type: boolean
        validationRules:
          type: string
          nullable: true
        order:
          type: integer
        options:
          type: string
          nullable: true

    FormFieldList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FormField'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - items
        - total
        - limit
        - offset

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

paths:
  /review-flows:
    post:
      summary: Создание процесса рассмотрения
      operationId: createReviewFlow
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewFlowCreate'
      responses:
        '200':
          description: Процесс рассмотрения успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewFlow'
        '400':
          description: Неверные данные запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Нет доступа к форме
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Форма не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    get:
      summary: Получение списка процессов рассмотрения
      operationId: listReviewFlows
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: ["OPEN", "CLOSED"]
        - name: formId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: organizationId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Список процессов рассмотрения
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewFlowList'
        '400':
          description: Неверные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /review-flows/{id}:
    get:
      summary: Получение информации о процессе рассмотрения
      operationId: getReviewFlow
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Информация о процессе рассмотрения
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewFlow'
        '400':
          description: Неверные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Нет доступа к процессу рассмотрения
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Процесс рассмотрения не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Обновление процесса рассмотрения
      operationId: updateReviewFlow
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewFlowUpdate'
      responses:
        '200':
          description: Процесс рассмотрения успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewFlow'
        '400':
          description: Неверные данные запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
